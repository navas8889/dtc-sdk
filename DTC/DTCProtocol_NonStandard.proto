syntax = "proto3";

package DTCNonStandard_PB;

//============================================================================
// DTC protocol version
enum DTCVersion 
{
    DTC_VERSION_UNSET = 0;
	CURRENT_VERSION = 8;
}

//============================================================================
// All messages are preceded by the following 4-byte little-endian binary
// header:
//
//	uint16 Size;  // size of the entire message including this 4-byte header
//	uint16 Type;  // DTC message type


//============================================================================
//----Message types----

enum DTCMessageType 
{
    MESSAGE_TYPE_UNSET = 0;

	HISTORICAL_TRADES_REQUEST = 10100;
	HISTORICAL_TRADES_REJECT = 10101;
	HISTORICAL_TRADES_RESPONSE = 10102;
	REPLAY_CHART_DATA = 10104;
	REPLAY_CHART_DATA_PERFORM_ACTION = 10105;
	REPLAY_CHART_DATA_STATUS = 10106;
	REQUEST_NUM_CURRENT_CLIENT_CONNECTIONS = 10107;
	NUM_CURRENT_CLIENT_CONNECTIONS_RESPONSE = 10108;
	MARKET_DATA_UPDATE_ORDER_IMBALANCE_DATA = 10200;
	
	TRADE_ACCOUNT_DATA_REQUEST = 10115;
	TRADE_ACCOUNT_DATA_RESPONSE = 10116;
	TRADE_ACCOUNT_DATA_UPDATE = 10117;
	TRADE_ACCOUNT_DATA_DELETE = 10118;

	TRADE_ACCOUNT_DATA_SYMBOL_COMMISSION_RESPONSE = 10119;
	TRADE_ACCOUNT_DATA_SYMBOL_COMMISSION_UPDATE = 10120;

	TRADE_ACCOUNT_DATA_SYMBOL_LIMITS_RESPONSE = 10121;
	TRADE_ACCOUNT_DATA_SYMBOL_LIMITS_UPDATE = 10122;

	TRADE_ACCOUNT_DATA_AUTHORIZED_USERNAME_RESPONSE = 10124;
	TRADE_ACCOUNT_DATA_AUTHORIZED_USERNAME_ADD = 10125;
	TRADE_ACCOUNT_DATA_AUTHORIZED_USERNAME_REMOVE = 10126;

	TRADE_ACCOUNT_DATA_USERNAME_TO_SHARE_WITH_RESPONSE = 10127;
	TRADE_ACCOUNT_DATA_USERNAME_TO_SHARE_WITH_ADD = 10128;
	TRADE_ACCOUNT_DATA_USERNAME_TO_SHARE_WITH_REMOVE = 10129;

	TRADE_ACCOUNT_DATA_RESPONSE_TRAILER = 10130;
	TRADE_ACCOUNT_DATA_UPDATE_OPERATION_COMPLETE = 10131;

	MARGIN_DATA_REQUEST = 10141;
	MARGIN_DATA_RESPONSE = 10142;
	
	TRADE_ACCOUNT_DATA_SUB_ACCOUNT_RESPONSE = 10201;
	TRADE_ACCOUNT_DATA_SUB_ACCOUNT_UPDATE = 10202;

}

//============================================================================
enum BuySellEnum 
{
  BUY_SELL_UNSET = 0;
  BUY = 1;
  SELL = 2;
}

//============================================================================
enum ReplayChartDataActionEnum
{
  REPLAY_CHART_DATA_ACTION_NONE = 0;
  REPLAY_CHART_DATA_ACTION_STOP = 1;
  REPLAY_CHART_DATA_ACTION_PAUSE = 2;
  REPLAY_CHART_DATA_ACTION_RESUME = 3;
  REPLAY_CHART_DATA_ACTION_FINISH = 4;
  REPLAY_CHART_DATA_ACTION_CHANGE_SPEED = 5;
}

//============================================================================
enum ReplayChartDataStatusEnum
{
  REPLAY_CHART_DATA_STATUS_UNSET = 0;
  REPLAY_CHART_DATA_STATUS_STARTED = 1;
  REPLAY_CHART_DATA_STATUS_ERROR = 2;
  REPLAY_CHART_DATA_STATUS_COMPLETE = 3;
}

//============================================================================
message HistoricalTradesRequest
{
	int32 RequestID = 1;
	string Symbol = 2;
	string TradeAccount = 3;
	sfixed64 StartDateTime = 4;
	uint32 SubAccountIdentifier = 5;
	uint32 CreateFlatToFlatTrades = 6;
}

//============================================================================
message HistoricalTradesReject
{
	int32 RequestID = 1;
	string RejectText = 2;
}

//============================================================================
message HistoricalTradesResponse
{
	int32 RequestID = 1;
	uint32 IsFinalMessage = 2;
	string Symbol = 3;
	string TradeAccount = 4;
	double EntryDateTime = 5;
	double ExitDateTime = 6;
	double EntryPrice = 7;
	double ExitPrice = 8;
	BuySellEnum TradeType = 9;
	uint32 EntryQuantity = 10;
	uint32 ExitQuantity = 11;
	uint32 MaxOpenQuantity = 12;
	double ClosedProfitLoss = 13;
	double MaximumOpenPositionLoss = 14;
	double MaximumOpenPositionProfit = 15;
	double Commission = 16;
	string OpenFillExecutionID = 17;
	string CloseFillExecutionID = 18;
	uint32 SubAccountIdentifier = 19;
}

//============================================================================
message ReplayChartData
{
	uint32 RequestID = 1;
	string Symbol = 2;
	string TradeAccount = 3;
	string TimeZone = 4;
	int64 StartDateTimeForInitialData = 5;
	int64 StartDateTime = 6;
	int64 StopDateTime = 7;
	uint32 SessionBeginTimeInSeconds = 8;
	uint32 SessionEndTimeInSeconds = 9;
	float ReplaySpeed = 10;
	int32 BarTimeInSeconds = 11;
	uint32 PauseReplayAfterInitialDataSent = 12;
	uint32 UseSavedPriorState = 13;
	float SymbolVolatility = 14;
	float InterestRate = 15;
	int32 NumberOfOrdersToTriggerFinishToStopDateTime = 16;
	int32 MaximumNumberOfOrdersPerReplaySession = 17;
	int32 NumberOfDaysForInitialDataFromBeforeLastSavedDateTime = 18;
	uint32 SubAccountIdentifier = 19;
	int32 OptionsPriceSendIntervalInSeconds = 20;
}

//============================================================================
message ReplayChartDataPerformAction
{
	uint32 RequestID = 1;
	ReplayChartDataActionEnum Action = 2;
	float ReplaySpeed = 3;
}

//============================================================================
message ReplayChartDataStatus
{
	uint32 RequestID = 1;
	string ErrorMessage = 2;
	ReplayChartDataStatusEnum Status = 3;
	uint32  SubAccountIdentifier = 4;
}

//============================================================================
